<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Fitness App</h1>
  <button id="btn-ejercicio">Agregar Ejercicio</button>
  <button id="btn-rutina">Crear Rutina</button>
  <button id="btn-progreso">Ver Progreso</button>

  <div id="ejercicio-form" style="display: none;">
    <h2>Agregar Ejercicio</h2>
    <input type="text" id="nombre-ejercicio" placeholder="Nombre del ejercicio">
    <button id="guardar-ejercicio">Guardar</button>
  </div>

  <div id="rutina-form" style="display: none;">
    <h2>Crear Rutina</h2>
    <input type="text" id="nombre-rutina" placeholder="Nombre de la rutina">
    <button id="guardar-rutina">Guardar</button>
  </div>

  <div id="progreso" style="display: none;">
    <h2>Ver Progreso</h2>
    <p> Aquí se mostrará el progreso del usuario.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
