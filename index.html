<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Fitness App</h1>
      <p>¡Mejora tu salud y bienestar!</p>
    </header>
    <nav>
      <button>Inicio</button>
      <button>Ejercicios</button>
      <button>Progreso</button>
    </nav>
    <main>
      <h2>¡Bienvenido a Fitness App!</h2>
      <p>Registra tus ejercicios y sigue tu progreso.</p>
      <img src="fitness-image.jpg" alt="Imagen de fitness">
    </main>
    <footer>
      <i class="dumbbell-icon"></i>
      <i class="heart-icon"></i>
      <i class="runner-icon"></i>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
